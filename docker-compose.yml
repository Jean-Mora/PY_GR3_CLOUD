version: '3.8'

services:
  academic-app:
    image: node:18-alpine
    container_name: academic_backend_app
    ports:
      - "80:3000"
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: sh -c "npm install && npm start"
    environment:
      - DB_HOST=academic-db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    networks:
      - academic-private-net
    restart: unless-stopped

  academic-db:
    image: postgres:15-alpine
    container_name: academic_postgres_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - academic-db-data:/var/lib/postgresql/data
    networks:
      - academic-private-net
    restart: unless-stopped

volumes:
  academic-db-data:

networks:
  academic-private-net:
    driver: bridge
